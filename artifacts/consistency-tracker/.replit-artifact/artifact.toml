kind = "web"
previewPath = "/"
title = "Consistency Tracker"
version = "1.0.0"
id = "artifacts/consistency-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22632

[services.development]
run = "pnpm --filter @workspace/consistency-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/consistency-tracker", "run", "build" ]
publicDir = "artifacts/consistency-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22632"
BASE_PATH = "/"
